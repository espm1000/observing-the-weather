name: build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: "${{ github.repository }}"
  APP_DIR: cmd/getweather/

jobs:
  build-and-push-image:
    if: ${{ !startsWith(github.head_ref || github.ref_name, 'chore') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Get Datetime
        run: |
          echo "TAGSTAMP=$(date +'%Y%m%d')" >> $GITHUB_ENV
      - name: Checkout Repo
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build Image
        id: build-image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.TAGSTAMP }}"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV
          docker build -t "$IMAGE" .
      - name: Push it real good
        id: push
        if: github.ref == 'refs/heads/main'
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.TAGSTAMP }}"
          docker push "${IMAGE}"

