name: build

on:
  release:
    types: [published]
  pull_request:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: "${{ github.repository }}"

jobs:
  build-and-push-image:
    if: ${{ !startsWith(github.head_ref || github.ref_name, 'chore') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build Image
        id: build-image
        run: |
          TAG="${{ github.event.release.tag_name }}"
          if [[ ${TAG} == "" ]]; then TAG=$(date +"%Y%m%d"); fi
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV
          docker build -t "$IMAGE" .
      - name: Push it real good
        id: push
        if: github.event_name == 'release'
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.release.tag_name }}"
          docker push "${IMAGE}"

