name: Release Please

permissions: {}

on:
    push:
        branches:
            - main

jobs:
    release-please:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
            issues: write
        steps:
            - uses: googleapis/release-please-action@v5
              with:
                release-type: go
                token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
                config-file: release-please-config.json
                manifest-file: .release-please-manifest.json
